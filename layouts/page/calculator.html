{{ define "main" }}
<div class="max-w-4xl mx-auto px-4 py-16" x-data="benchmarkApp()">
    
    <div class="calc-header">
        <h1 class="calc-title">🤖 NUC AI 算力矩阵</h1>
        <p class="calc-subtitle">选择硬件型号，查看本地大模型推理速度对比</p>
    </div>

    <!-- 筛选器 -->
    <div class="calc-card">
        <label class="calc-label">选择硬件型号</label>
        <select x-model="selectedId" class="calc-select">
            <option value="0">请选择迷你主机 / NUC 型号...</option>
            <template x-for="machine in machines" :key="machine.id">
                <option :value="machine.id" x-text="machine.cpu_model + ' (' + machine.ram_config + ')'"></option>
            </template>
        </select>
        
        <!-- 分类筛选 -->
        <div class="category-filter">
            <button 
                class="category-btn" 
                :class="categoryFilter === '' ? 'active' : ''"
                @click="categoryFilter = ''"
            >全部</button>
            <template x-for="cat in categories" :key="cat">
                <button 
                    class="category-btn" 
                    :class="categoryFilter === cat ? 'active' : ''"
                    @click="categoryFilter = cat"
                    x-text="cat"
                ></button>
            </template>
        </div>
    </div>

    <!-- 结果展示 -->
    <div x-show="selectedId != 0" class="result-section" style="display: none;">
        <div class="machine-info">
            <div class="machine-header">
                <span class="machine-category" x-text="currentMachine.category"></span>
                <span class="machine-ram" x-text="currentMachine.ram_config"></span>
            </div>
            <h2 class="machine-name" x-text="currentMachine.cpu_model"></h2>
        </div>
        
        <div class="benchmark-grid">
            <template x-for="bench in currentBenchmarks" :key="bench.model">
                <div class="benchmark-card">
                    <div class="benchmark-left">
                        <div class="benchmark-model" x-text="bench.model"></div>
                        <div class="benchmark-engine" x-text="'Engine: ' + bench.engine"></div>
                    </div>
                    <div class="benchmark-right">
                        <div class="benchmark-speed" 
                             :class="getSpeedClass(bench.speed)"
                             x-text="bench.speed">
                        </div>
                        <div class="benchmark-unit" x-text="bench.unit"></div>
                    </div>
                </div>
            </template>
        </div>
        
        <!-- 性能等级 -->
        <div class="perf-level">
            <span class="perf-label">综合评级：</span>
            <span class="perf-badge" :class="perfLevel.class" x-text="perfLevel.text"></span>
        </div>
    </div>

    <div x-show="selectedId == 0" class="empty-state">
        <div class="empty-icon">🖥️</div>
        <p>选择硬件型号查看算力对比</p>
    </div>

    <!-- 数据说明 -->
    <div class="info-section">
        <h3>📊 数据说明</h3>
        <ul>
            <li>测试数据基于 Q4_K_M 量化模型，实际性能因模型、量化方式不同可能有差异</li>
            <li>推理速度单位：T/s (Tokens per Second)，数值越高越好</li>
            <li>推荐配置：32GB+ RAM 运行 7B 模型，64GB+ 运行 14B 模型</li>
        </ul>
    </div>

</div>

<script>
    function benchmarkApp() {
        return {
            selectedId: 0,
            categoryFilter: '',
            machines: {{ .Site.Data.benchmarks | jsonify | safeJS }},
            get categories() {
                const cats = [...new Set(this.machines.map(m => m.category))];
                return cats.sort();
            },
            get filteredMachines() {
                if (!this.categoryFilter) return this.machines;
                return this.machines.filter(m => m.category === this.categoryFilter);
            },
            get currentMachine() {
                return this.machines.find(m => m.id == this.selectedId) || {};
            },
            get currentBenchmarks() {
                const machine = this.machines.find(m => m.id == this.selectedId);
                return machine ? machine.benchmarks : [];
            },
            get perfLevel() {
                if (this.currentBenchmarks.length === 0) return { text: '-', class: '' };
                const avgSpeed = this.currentBenchmarks.reduce((sum, b) => sum + b.speed, 0) / this.currentBenchmarks.length;
                if (avgSpeed >= 20) return { text: '旗舰级', class: 'level-flagship' };
                if (avgSpeed >= 15) return { text: '高性能', class: 'level-high' };
                if (avgSpeed >= 10) return { text: '主流', class: 'level-mainstream' };
                return { text: '入门', class: 'level-entry' };
            },
            getSpeedClass(speed) {
                if (speed >= 20) return 'speed-fast';
                if (speed >= 10) return 'speed-medium';
                return 'speed-slow';
            }
        }
    }
</script>
