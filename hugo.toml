baseURL = "https://www.nucnas.top/"
languageCode = "zh-CN"
title = "NUC NAS Hub - 迷你主机与NAS测评网"
enableRobotsTXT = true
enableGitInfo = true

# SEO 配置
[params]
  description = "NUC NAS Hub - 专业的迷你主机与NAS测评网站，提供硬件测评、NAS教程、本地AI部署指南"
  author = "NUCNAS.HUB"

# Open Graph 图片
[params.og]
  image = "/images/og-image.jpg"

# 单一语言，不再使用多语言
# defaultContentLanguage = "zh"
# defaultContentLanguageInSubdir = true

# [languages]
#   [languages.zh]
#     languageName = "中文"
#     weight = 1
#     title = "NUC NAS Hub - 迷你主机与NAS测评网"
    
#   [languages.en]
#     languageName = "English"
#     weight = 2
#     title = "NUC NAS Hub - Mini PC & NAS Reviews"

[pagination]
  pagerSize = 12

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]

[taxonomies]
  tag = "tags"
  category = "categories"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[permalinks]
  posts = "/post/:slug/"
  hardware = "/review/:slug/"
  nas = "/guide/:slug/"
  ai = "/ai/:slug/"
  page = "/:slug/"

[minify]
  disableXML = true
  minifyOutput = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
