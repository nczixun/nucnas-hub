baseURL = "https://www.nucnas.top/"
languageCode = "zh-CN"
title = "NUC NAS Hub"
enableRobotsTXT = true
enableGitInfo = true

# UTF-8 encoding
defaultContentLanguage = "zh"
hasCJKLanguage = true

[encoding]
  charset = "utf-8"

# 单一语言，不再使用多语言
# defaultContentLanguage = "zh"
# defaultContentLanguageInSubdir = true

# [languages]
#   [languages.zh]
#     languageName = "中文"
#     weight = 1
#     title = "NUC NAS Hub - 迷你主机与NAS测评网"
    
#   [languages.en]
#     languageName = "English"
#     weight = 2
#     title = "NUC NAS Hub - Mini PC & NAS Reviews"

[pagination]
  pagerSize = 12

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]

[taxonomies]
  tag = "tags"
  category = "categories"

[sitemap]
  changefreq = "daily"
  filename = "sitemap.xml"
  priority = 0.5

[params]
  description = "NUC NAS Hub - 专注迷你主机、NAS私有云与本地AI部署的专业测评网站。提供最详细的硬件评测、NAS系统教程、本地AI部署方案。"

[permalinks]
  posts = "/post/:slug/"
  hardware = "/review/:slug/"
  nas = "/guide/:slug/"
  ai = "/ai/:slug/"
  page = "/:slug/"

# minify disabled due to Chinese encoding issues
# [minify]
#   disableXML = true
#   minifyOutput = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
